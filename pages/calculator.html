    <style>
      /* إعدادات الألوان الافتراضية (الوضع المضيء) */
      :root {
        --body-bg: #f8fafc;
        --body-text: #0f172a;
        --navbar-bg: #212529; /* الحفاظ على الـ Navbar داكنة بشكل أنيق */

        --hero-bg: #0dcaf0;
        --hero-text: #ffffff;

        --calc-bg: #1e293b; /* الحفاظ على جسم الحاسبة داكن ليعطي شعور الآلة الحقيقية */
        --calc-screen-bg: #000000;
        --calc-screen-text: #ffffff;
        --calc-btn-digit: rgba(255, 255, 255, 0.15);
        --calc-btn-text: #ffffff;

        --card-border: rgba(0, 0, 0, 0.1);
      }

      /* متغيرات الألوان عند التحول للوضع المظلم */
      body.dark-theme {
        --body-bg: #0f172a;
        --body-text: #f8fafc;
        --navbar-bg: #090d16;

        --hero-bg: #111827;
        --hero-text: #0dcaf0;

        --calc-bg: #111827;
        --calc-screen-bg: #030712;
        --calc-screen-text: #0dcaf0; /* توهج شاشة الحاسبة في الوضع المظلم */
        --calc-btn-digit: rgba(255, 255, 255, 0.08);
        --calc-btn-text: #f8fafc;

        --card-border: rgba(255, 255, 255, 0.05);
      }

      body {
        background-color: var(--body-bg);
        color: var(--body-text);
        transition:
          background-color 0.3s ease,
          color 0.3s ease;
      }

      .custom-link {
        color: rgba(248, 250, 252, 0.86);
        transition: color 0.2s ease;
      }
      .custom-link:hover,
      .custom-link.active {
        color: #ffffff;
      }

      body.light-theme .navbar-custom {
        background-color: rgba(255, 255, 255, 0.95) !important;
        border-bottom: 1px solid rgba(241, 245, 249, 0.5);
      }
      body.light-theme .custom-link {
        color: var(--body-text) !important;
      }
      body.light-theme .custom-link:hover,
      body.light-theme .custom-link.active {
        color: #0d6efd !important;
      }

      .btn-theme-toggle {
        color: #fff;
        border: 1px solid rgba(255, 255, 255, 0.25);
      }
      body.light-theme .btn-theme-toggle {
        color: var(--body-text);
        border: 1px solid rgba(0, 0, 0, 0.12);
      }

      body:not(.dark-theme) .navbar-toggler-icon {
        filter: invert(1);
      }

      .hero-section {
        background-color: var(--hero-bg) !important;
        color: var(--hero-text) !important;
        transition:
          background-color 0.3s ease,
          color 0.3s ease;
      }

      /* كرت الحاسبة وكرت السجل */
      .custom-calc-card {
        background-color: var(--calc-bg) !important;
        border: 1px solid var(--card-border) !important;
        transition:
          background-color 0.3s ease,
          border 0.3s ease;
      }

      .calculator-screen {
        background-color: var(--calc-screen-bg) !important;
        color: var(--calc-screen-text) !important;
        transition:
          background-color 0.3s ease,
          color 0.3s ease;
      }

      /* أزرار الأرقام */
      .btn-digit {
        background-color: var(--calc-btn-digit) !important;
        color: var(--calc-btn-text) !important;
        transition:
          background-color 0.2s ease,
          transform 0.1s ease;
      }
      .btn-digit:hover {
        background-color: rgba(255, 255, 255, 0.25) !important;
        transform: scale(1.03);
      }

      /* زر التبديل */
      .btn-theme-toggle {
        transition: all 0.3s ease;
      }

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      // Calculator state and helpers are kept inside this page so the logic stays close to the layout.
      const calculator = {
        displayValue: "0",
        firstOperand: null,
        waitingForSecondOperand: false,
        operator: null,
      };

      let historyArray = JSON.parse(localStorage.getItem("calcHistory")) || [];

      // Handle a digit button press and update the display value accordingly.
      function inputDigit(digit) {
        if (calculator.waitingForSecondOperand) {
          calculator.displayValue = digit;
          calculator.waitingForSecondOperand = false;
          return;
        }

        calculator.displayValue =
          calculator.displayValue === "0"
            ? digit
            : calculator.displayValue + digit;
      }

      // Add a decimal point to the current number, but avoid duplicates.
      function inputDecimal(dot) {
        if (calculator.waitingForSecondOperand) {
          calculator.displayValue = "0" + dot;
          calculator.waitingForSecondOperand = false;
          return;
        }

        if (!calculator.displayValue.includes(dot)) {
          calculator.displayValue += dot;
        }
      }

      function handleOperator(nextOperator) {
        const { firstOperand, displayValue, operator } = calculator;
        const inputValue = parseFloat(displayValue);

        if (operator && calculator.waitingForSecondOperand) {
          calculator.operator = nextOperator;
          return;
        }

        if (firstOperand == null) {
          calculator.firstOperand = inputValue;
        } else if (operator) {
          const result = performCalculation[operator](firstOperand, inputValue);
          saveToHistory(firstOperand, operator, inputValue, result);
          calculator.displayValue = String(result);
          calculator.firstOperand = result;
        }

        calculator.waitingForSecondOperand = true;
        calculator.operator = nextOperator;
      }

      const performCalculation = {
        "/": (firstOperand, secondOperand) => firstOperand / secondOperand,
        "*": (firstOperand, secondOperand) => firstOperand * secondOperand,
        "+": (firstOperand, secondOperand) => firstOperand + secondOperand,
        "-": (firstOperand, secondOperand) => firstOperand - secondOperand,
        "=": (_firstOperand, secondOperand) => secondOperand,
      };

      function resetCalculator() {
        calculator.displayValue = "0";
        calculator.firstOperand = null;
        calculator.waitingForSecondOperand = false;
        calculator.operator = null;
      }

      function updateDisplay() {
        document.querySelectorAll(".calculator-screen").forEach((display) => {
          display.value = calculator.displayValue;
        });
      }

      // Keep a small history of operations for the user so they can review recent calculations.
      function saveToHistory(first, op, second, res) {
        if (op === "=") return;

        historyArray.push(`${first} ${op} ${second} = ${res}`);
        localStorage.setItem("calcHistory", JSON.stringify(historyArray));
        updateHistoryUI();
      }

      function updateHistoryUI() {
        const historyList = document.getElementById("historyList");
        if (!historyList) return;

        historyList.innerHTML = "";
        [...historyArray].reverse().forEach((item) => {
          const li = document.createElement("li");
          li.className =
            "list-group-item bg-dark text-light border-secondary font-monospace fs-6";
          li.textContent = item;
          historyList.appendChild(li);
        });
      }

      function clearHistory() {
        historyArray = [];
        localStorage.removeItem("calcHistory");
        updateHistoryUI();
      }

      document.addEventListener("DOMContentLoaded", () => {
        updateDisplay();
        updateHistoryUI();

        const keys = document.querySelector(".calculator-keys");
        if (!keys) return;

        keys.addEventListener("click", (event) => {
          const target = event.target;
          if (!target.matches("button")) return;

          if (target.classList.contains("operator")) {
            handleOperator(target.value);
            updateDisplay();
            return;
          }

          if (target.classList.contains("decimal")) {
            inputDecimal(target.value);
            updateDisplay();
            return;
          }

          if (target.classList.contains("all-clear")) {
            resetCalculator();
            updateDisplay();
            return;
          }

          inputDigit(target.value);
          updateDisplay();
        });

        const clearHistoryBtn = document.getElementById("clearHistoryBtn");
        if (clearHistoryBtn) {
          clearHistoryBtn.addEventListener("click", clearHistory);
        }
      });
    </script>
